# Zabbix Proxy Configuration File (Fallback)
# This config is overridden at runtime when ZBX_SERVER_HOST is set
# via container environment variables on the MikroTik.

ProxyMode=0
Server=127.0.0.1
Hostname=zabbix-proxy
ListenPort=10051
LogType=console
LogFileSize=0
DebugLevel=3
DBName=/var/lib/zabbix/zabbix_proxy.db
ProxyLocalBuffer=0
ProxyOfflineBuffer=1
HeartbeatFrequency=60
ConfigFrequency=60
DataSenderFrequency=1
StartPollers=5
StartPollersUnreachable=1
StartTrappers=5
StartPingers=1
StartDiscoverers=1
CacheSize=8M
HistoryCacheSize=16M
HistoryIndexCacheSize=4M
Timeout=4
TrapperTimeout=300
UnreachablePeriod=45
UnavailableDelay=60
UnreachableDelay=15
FpingLocation=/usr/sbin/fping
