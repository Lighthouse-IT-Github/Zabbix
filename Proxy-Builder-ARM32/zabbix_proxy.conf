# Zabbix Proxy Configuration File
# For MikroTik RB4011 Container Deployment

# Proxy mode: 0 = Active, 1 = Passive
ProxyMode=0

# Zabbix server address (CHANGE THIS)
Server=zabbix.example.com

# Unique proxy hostname (CHANGE THIS)
Hostname=rb4011-proxy

# Listen port for passive proxy / trapper
ListenPort=10051

# Logging
LogType=console
LogFileSize=0
DebugLevel=3

# SQLite Database
DBName=/var/lib/zabbix/zabbix_proxy.db

# Buffer settings (important for edge deployments)
# Local buffer in hours (data kept after sent to server)
ProxyLocalBuffer=0
# Offline buffer in hours (data kept if server unreachable)
ProxyOfflineBuffer=1

# Communication with server
HeartbeatFrequency=60
ConfigFrequency=60
DataSenderFrequency=1

# Pollers and workers (keep low for RB4011 resources)
StartPollers=5
StartPollersUnreachable=1
StartTrappers=5
StartPingers=1
StartDiscoverers=1

# Cache sizes (conservative for limited RAM)
CacheSize=8M
HistoryCacheSize=16M
HistoryIndexCacheSize=4M

# Timeouts
Timeout=4
TrapperTimeout=300
UnreachablePeriod=45
UnavailableDelay=60
UnreachableDelay=15

### TLS Settings (uncomment and configure as needed)
# TLSConnect=psk
# TLSAccept=psk
# TLSPSKIdentity=rb4011-proxy
# TLSPSKFile=/etc/zabbix/zabbix_proxy.psk
